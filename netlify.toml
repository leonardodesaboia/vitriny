[build]
  command = "npm run build"
  publish = ".next"

# Exclude documentation and local dev files from secrets scanning.
# These files contain placeholder/example values intentionally, not real secrets.
[build.environment]
  SECRETS_SCAN_OMIT_PATHS = ".env.example,README.md,docker-compose.yml,docs,tests,playwright.config.ts,vitest.integration.config.ts,.netlify"
