services:
  postgres:
    image: postgres:16
    container_name: orcafacil-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orcafacil
      POSTGRES_PASSWORD: orcafacil
      POSTGRES_DB: orcafacil
    ports:
      - "5432:5432"
    volumes:
      - orcafacil-postgres-data:/var/lib/postgresql/data

volumes:
  orcafacil-postgres-data:
