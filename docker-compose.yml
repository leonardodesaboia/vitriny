services:
  postgres:
    image: postgres:16
    container_name: vitriny-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vitriny
      POSTGRES_PASSWORD: vitriny
      POSTGRES_DB: vitriny
    ports:
      - "5432:5432"
    volumes:
      - vitriny-postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: vitriny-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console web
    volumes:
      - vitriny-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cria o bucket automaticamente na primeira execução
  minio-init:
    image: minio/mc:latest
    container_name: vitriny-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/vitriny &&
        mc anonymous set download local/vitriny
      "

volumes:
  vitriny-postgres-data:
  vitriny-minio-data:
